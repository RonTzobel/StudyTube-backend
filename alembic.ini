# =============================================================================
# alembic.ini — Alembic configuration for StudyTube backend
#
# Run from the project root (backend/):
#   alembic upgrade head        — apply all pending migrations
#   alembic current             — show applied revision
#   alembic history             — list all revisions
#   alembic revision -m "msg"   — generate a new migration file
# =============================================================================

[alembic]
# Path to the migration scripts directory, relative to this file.
script_location = alembic

# Template used when generating new migration files.
file_template = %%(rev)s_%%(slug)s

# The database URL is set dynamically in alembic/env.py from the project's
# settings (app.config.settings.Settings). The placeholder below is NEVER
# used — it is overridden before any connection is made.
sqlalchemy.url = driver://override/set/in/env.py

# Prepend sys.path with this directory so `import app` works when running
# alembic from outside the Docker container (e.g. locally or in CI).
# Leave empty when running inside the container (WORKDIR=/app already on path).
prepend_sys_path = .

[post_write_hooks]
# No post-write hooks configured.

# ---------------------------------------------------------------------------
# Logging
# ---------------------------------------------------------------------------
[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
